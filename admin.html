<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XENVAULT — Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F1015'/><text x='50' y='68' font-size='52' font-weight='800' font-family='Sora' fill='%238A6CFF' text-anchor='middle'>X</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  :root {
    --bg: #0A0B10;
    --surface: #12141C;
    --surface-2: #1A1D2A;
    --border: #282D3D;
    --accent: #8A6CFF;
    --accent-glow: rgba(138, 108, 255, 0.25);
    --gold: #F4B740;
    --pink: #FF4D7D;
    --teal: #3FD6C1;
    --text: #F0F1F5;
    --muted: #8A8FA8;
    --muted-2: #555B73;
    --radius: 14px;
    --transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 20px 5vw;
    min-height: 100vh;
  }
  a {
    color: var(--accent);
    text-decoration: none;
  }
  .admin-container {
    max-width: 1100px;
    margin: 0 auto;
  }
  .back-link {
    color: var(--muted);
    margin-bottom: 20px;
    display: inline-block;
    transition: color 0.2s;
  }
  .back-link:hover {
    color: var(--text);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 24px;
    transition: var(--transition);
  }
  .card:hover {
    border-color: rgba(138, 108, 255, 0.2);
  }
  .card h2 {
    font-family: 'Sora', sans-serif;
    font-size: 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card h2 .badge {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    padding: 2px 10px;
    border-radius: 100px;
    font-weight: 600;
  }
  .card h2 i {
    color: var(--accent);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 600px) {
    .form-row {
      grid-template-columns: 1fr;
    }
  }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted-2);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    transition: var(--transition);
  }
  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn-admin {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent), #6A4CE0);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-admin:hover {
    transform: scale(1.02);
  }
  .btn-danger {
    background: var(--pink);
  }
  .btn-danger:hover {
    background: #cc0044;
  }
  .btn-success {
    background: var(--teal);
    color: #000;
  }
  .btn-success:hover {
    background: #2ab89f;
  }

  .item-list {
    display: grid;
    gap: 8px;
  }
  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: var(--transition);
  }
  .item-row:hover {
    border-color: var(--accent);
  }
  .item-row .info {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .item-row .name {
    font-family: 'Sora', sans-serif;
    font-weight: 700;
  }
  .item-row .tier {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--surface-2);
  }
  .item-row .price {
    color: var(--teal);
    font-weight: 700;
  }
  .item-row .status {
    font-size: 11px;
    color: var(--muted-2);
  }
  .item-row .delete-btn {
    background: none;
    border: none;
    color: var(--muted-2);
    cursor: pointer;
    font-size: 16px;
    transition: var(--transition);
  }
  .item-row .delete-btn:hover {
    color: var(--pink);
  }
  .item-row .email {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .item-row .crypto-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: rgba(138, 108, 255, 0.12);
    color: var(--accent);
  }
  .item-row .time {
    font-size: 11px;
    color: var(--muted-2);
  }

  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 12px;
  }
  .alert-success {
    background: rgba(63, 214, 193, 0.12);
    border: 1px solid var(--teal);
    color: var(--teal);
  }
  .alert-error {
    background: rgba(255, 77, 125, 0.12);
    border: 1px solid var(--pink);
    color: var(--pink);
  }

  .empty {
    color: var(--muted-2);
    text-align: center;
    padding: 30px;
  }

  .badge-pending {
    background: rgba(244, 183, 64, 0.15);
    color: var(--gold);
    padding: 2px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-delivered {
    background: rgba(63, 214, 193, 0.15);
    color: var(--teal);
    padding: 2px 12px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }
  .action-btns {
    display: flex;
    gap: 8px;
  }
  .action-btns button {
    padding: 4px 14px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .action-btns .confirm-btn {
    background: var(--teal);
    color: #000;
  }
  .action-btns .confirm-btn:hover {
    transform: scale(1.05);
  }
  .action-btns .reject-btn {
    background: var(--pink);
    color: #fff;
  }
  .action-btns .reject-btn:hover {
    transform: scale(1.05);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .stat-box {
    background: var(--bg);
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .stat-box .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    display: block;
  }
  .stat-box .num.gold {
    color: var(--gold);
  }
  .stat-box .num.teal {
    color: var(--teal);
  }
  .stat-box .num.accent {
    color: var(--accent);
  }
  .stat-box .label {
    font-size: 11px;
    color: var(--muted-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
</style>
</head>
<body>

<!-- 🔐 PASSWORD PROTECTION -->
<script>
  (function() {
    const ADMIN_PASSWORD = "xenvault2026";
    const SESSION_KEY = 'xenvault_admin_auth';
    if (sessionStorage.getItem(SESSION_KEY) === 'true') return;
    const entered = prompt("🔐 Enter admin password:");
    if (entered === ADMIN_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, 'true');
    } else {
      alert("❌ Incorrect password. Redirecting to home.");
      window.location.href = "index.html";
    }
  })();
</script>

<div class="admin-container">
  <a href="index.html" class="back-link">← Back to Marketplace</a>

  <!-- ====== STATS ====== -->
  <div class="card">
    <h2><i>📊</i> Dashboard</h2>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-box"><span class="num gold" id="statTotal">0</span><span class="label">Total Names</span></div>
      <div class="stat-box"><span class="num teal" id="statAvailable">0</span><span class="label">Available</span></div>
      <div class="stat-box"><span class="num" id="statSold">0</span><span class="label">Sold</span></div>
      <div class="stat-box"><span class="num accent" id="statPending">0</span><span class="label">Pending Orders</span></div>
      <div class="stat-box"><span class="num gold" id="statRevenue">$0</span><span class="label">Revenue</span></div>
    </div>
  </div>

  <!-- ====== PENDING ORDERS ====== -->
  <div class="card">
    <h2><i>⏳</i> Pending Orders <span class="badge" id="pendingBadge">0</span></h2>
    <div id="pendingList" class="item-list"></div>
  </div>

  <!-- ====== ADD PRODUCT ====== -->
  <div class="card">
    <h2><i>+</i> Add New Username</h2>
    <form id="addForm">
      <div class="form-row">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="aName" placeholder="e.g., x" required />
        </div>
        <div class="form-group">
          <label>Tier *</label>
          <select id="aTier">
            <option value="og">OG</option>
            <option value="rare">Rare</option>
            <option value="vintage">Vintage</option>
            <option value="plain">Clean</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Meta / Description</label>
          <input type="text" id="aMeta" placeholder="e.g., 4-char · dictionary word" />
        </div>
        <div class="form-group">
          <label>Price ($) *</label>
          <input type="number" id="aPrice" placeholder="1999" step="1" required />
        </div>
      </div>
      <button type="submit" class="btn-admin">Add Username</button>
      <div id="addStatus"></div>
    </form>
  </div>

  <!-- ====== INVENTORY ====== -->
  <div class="card">
    <h2><i>📦</i> Inventory</h2>
    <div id="inventoryList" class="item-list"></div>
  </div>

  <!-- ====== TOOLS ====== -->
  <div class="card">
    <h2><i>⚙️</i> Tools</h2>
    <button class="btn-admin btn-danger" onclick="resetInventory()">Reset to Default</button>
    <button class="btn-admin" style="margin-left:12px;" onclick="clearPending()">Clear All Pending</button>
    <p style="color:var(--muted-2); font-size:12px; margin-top:8px;">⚠️ Reset deletes all custom products. Clear pending removes all payment requests.</p>
  </div>
</div>

<script>
  // ============================================================
  // 🩸 XENVAULT ADMIN — WITH PENDING ORDERS
  // ============================================================

  // ----- DATA HELPERS -----
  function getInventory() {
    const stored = localStorage.getItem('xenvault_inventory');
    if (stored) {
      try { return JSON.parse(stored); } catch (e) {}
    }
    return [];
  }

  function saveInventory(data) {
    localStorage.setItem('xenvault_inventory', JSON.stringify(data));
  }

  function getPending() {
    const stored = localStorage.getItem('xenvault_pending');
    if (stored) {
      try { return JSON.parse(stored); } catch (e) {}
    }
    return [];
  }

  function savePending(data) {
    localStorage.setItem('xenvault_pending', JSON.stringify(data));
  }

  // ----- STATS -----
  function updateStats() {
    const inv = getInventory();
    const pending = getPending();
    const total = inv.length;
    const sold = inv.filter(d => d.sold).length;
    const avail = total - sold;
    const revenue = inv.filter(d => d.sold).reduce((s, d) => s + d.value, 0);

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAvailable').textContent = avail;
    document.getElementById('statSold').textContent = sold;
    document.getElementById('statPending').textContent = pending.length;
    document.getElementById('statRevenue').textContent = '$' + revenue.toLocaleString();
    document.getElementById('pendingBadge').textContent = pending.length;
  }

  // ----- RENDER PENDING -----
  function renderPending() {
    const pending = getPending();
    const container = document.getElementById('pendingList');

    if (pending.length === 0) {
      container.innerHTML = '<div class="empty">✅ No pending orders.</div>';
      return;
    }

    container.innerHTML = pending.map((p, idx) => `
      <div class="item-row">
        <div class="info">
          <span class="name">@${p.username}</span>
          <span class="crypto-tag">${p.crypto}</span>
          <span class="price">$${p.amount.toLocaleString()}</span>
          <span class="email">${p.email}</span>
          <span class="time">${new Date(p.timestamp).toLocaleString()}</span>
          <span class="badge-pending">Pending</span>
        </div>
        <div class="action-btns">
          <button class="confirm-btn" onclick="confirmOrder(${idx})">✅ Confirm</button>
          <button class="reject-btn" onclick="rejectOrder(${idx})">✕ Reject</button>
        </div>
      </div>
    `).join('');
  }

  // ----- RENDER INVENTORY -----
  function renderInventory() {
    const data = getInventory();
    const container = document.getElementById('inventoryList');
    if (data.length === 0) {
      container.innerHTML = '<div class="empty">No products in inventory.</div>';
      return;
    }
    container.innerHTML = data.map((d) => `
      <div class="item-row">
        <div class="info">
          <span class="name">@${d.name}</span>
          <span class="tier">${d.tier.toUpperCase()}</span>
          <span class="price">$${d.value.toLocaleString()}</span>
          <span class="status">${d.sold ? 'SOLD' : 'Available'}</span>
        </div>
        <button class="delete-btn" onclick="deleteProduct('${d.name}')">✕</button>
      </div>
    `).join('');
  }

  // ----- PENDING ACTIONS -----
  function confirmOrder(index) {
    const pending = getPending();
    if (!pending[index]) return;

    const order = pending[index];
    const inv = getInventory();
    const product = inv.find(d => d.name === order.username);

    // Remove from pending
    pending.splice(index, 1);
    savePending(pending);

    // Mark as sold
    if (product) {
      product.sold = true;
      saveInventory(inv);
    }

    updateStats();
    renderPending();
    renderInventory();
    showAddStatus('✅ Order confirmed! @' + order.username + ' marked as sold.', 'success');
  }

  function rejectOrder(index) {
    const pending = getPending();
    if (!pending[index]) return;

    const order = pending[index];
    pending.splice(index, 1);
    savePending(pending);

    updateStats();
    renderPending();
    showAddStatus('❌ Order rejected for @' + order.username, 'error');
  }

  function clearPending() {
    if (!confirm('Clear all pending orders?')) return;
    savePending([]);
    updateStats();
    renderPending();
    showAddStatus('✅ All pending orders cleared.', 'success');
  }

  // ----- INVENTORY ACTIONS -----
  function deleteProduct(name) {
    if (!confirm(`Delete @${name}?`)) return;
    let data = getInventory();
    data = data.filter(d => d.name !== name);
    saveInventory(data);
    renderInventory();
    updateStats();
    showAddStatus('🗑️ Deleted @' + name, 'error');
  }

  function resetInventory() {
    if (!confirm('Reset to default inventory? All custom products will be lost.')) return;
    const defaultData = [
      { name: "erase", tier: "og", meta: "4-char · dictionary word", value: 18400, sold: false },
      { name: "admire", tier: "og", meta: "6-char · clean word", value: 12900, sold: false },
      { name: "vex", tier: "og", meta: "3-char · rare cluster", value: 9600, sold: false },
      { name: "quartz", tier: "og", meta: "6-char · word", value: 8100, sold: false },
      { name: "drift", tier: "rare", meta: "5-char · word-match", value: 3400, sold: false },
      { name: "cipher", tier: "rare", meta: "6-char · dev-adjacent", value: 2650, sold: false },
      { name: "ember", tier: "rare", meta: "5-char · aesthetic", value: 1950, sold: false },
      { name: "raven", tier: "rare", meta: "5-char · word", value: 1700, sold: false },
      { name: "nullpnt", tier: "vintage", meta: "Dev-slang · legacy", value: 1100, sold: false },
      { name: "ashcore", tier: "vintage", meta: "Legacy-style", value: 980, sold: false },
      { name: "ferox", tier: "vintage", meta: "Legacy-style", value: 750, sold: false },
      { name: "lowkey", tier: "plain", meta: "Word-match", value: 420, sold: false },
      { name: "glint", tier: "plain", meta: "Short word", value: 390, sold: false },
      { name: "yonder", tier: "plain", meta: "Distinct word", value: 310, sold: false },
    ];
    saveInventory(defaultData);
    renderInventory();
    updateStats();
    showAddStatus('✅ Reset to default inventory.', 'success');
  }

  // ----- ADD PRODUCT -----
  document.getElementById('addForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('aName').value.trim();
    const tier = document.getElementById('aTier').value;
    const meta = document.getElementById('aMeta').value.trim() || tier.toUpperCase() + ' · rare handle';
    const value = parseInt(document.getElementById('aPrice').value);

    if (!name || !value) {
      showAddStatus('❌ Please fill in all required fields.', 'error');
      return;
    }

    const data = getInventory();
    if (data.find(d => d.name === name)) {
      showAddStatus('❌ Username already exists.', 'error');
      return;
    }

    data.push({ name, tier, meta, value, sold: false });
    saveInventory(data);
    renderInventory();
    updateStats();
    this.reset();
    showAddStatus('✅ Added @' + name + ' for $' + value.toLocaleString(), 'success');
  });

  function showAddStatus(msg, type) {
    const el = document.getElementById('addStatus');
    el.className = 'alert alert-' + type;
    el.textContent = msg;
    setTimeout(() => { el.className = ''; el.textContent = ''; }, 4000);
  }

  // ----- INIT -----
  updateStats();
  renderPending();
  renderInventory();
</script>
</body>
</html>
