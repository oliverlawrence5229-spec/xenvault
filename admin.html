<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XENVAULT — Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230F1015'/><text x='50' y='68' font-size='52' font-weight='800' font-family='Arial' fill='%238A6CFF' text-anchor='middle'>X</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0F1015;
    --panel:#181A22;
    --panel-2:#1E212B;
    --line:#2A2E3A;
    --accent:#8A6CFF;
    --accent-warm:#FF8A5C;
    --gold:#F4B740;
    --rare:#FF4D7D;
    --teal:#3FD6C1;
    --text:#F5F6FA;
    --muted:#9BA1B5;
    --muted-2:#5F6577;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:20px 5vw;
  }
  a{color:var(--accent); text-decoration:none;}
  .admin-container{max-width:1000px; margin:0 auto;}
  .back-link{color:var(--muted); margin-bottom:20px; display:inline-block;}
  .back-link:hover{color:var(--text);}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px;
    margin-bottom:24px;
  }
  .card h2{font-family:'Sora',sans-serif; font-size:18px; margin-bottom:16px;}
  .card h2 i{color:var(--accent); margin-right:8px;}
  .form-row{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px;}
  @media(max-width:600px){.form-row{grid-template-columns:1fr;}}
  .form-group label{display:block; font-size:12px; color:var(--muted-2); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px;}
  .form-group input, .form-group select{
    width:100%; padding:12px 14px;
    background:var(--bg); border:1px solid var(--line); border-radius:8px;
    color:var(--text); font-size:14px;
  }
  .form-group input:focus, .form-group select:focus{outline:none; border-color:var(--accent);}
  .btn-admin{
    padding:12px 28px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:0.2s;
  }
  .btn-admin:hover{transform:scale(1.02);}
  .btn-danger{background:var(--rare);}
  .btn-danger:hover{background:#cc0044;}

  .item-list{display:grid; gap:8px;}
  .item-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 16px;
    background:var(--bg);
    border-radius:8px;
    border:1px solid var(--line);
  }
  .item-row .info{display:flex; gap:16px; align-items:center; flex-wrap:wrap;}
  .item-row .name{font-family:'Sora',sans-serif; font-weight:700;}
  .item-row .tier{font-size:11px; padding:2px 10px; border-radius:12px; background:var(--panel-2);}
  .item-row .price{color:var(--teal); font-weight:700;}
  .item-row .status{font-size:11px; color:var(--muted-2);}
  .item-row .delete-btn{background:none; border:none; color:var(--muted-2); cursor:pointer; font-size:16px;}
  .item-row .delete-btn:hover{color:var(--rare);}

  .alert{padding:12px 16px; border-radius:8px; margin-top:12px;}
  .alert-success{background:rgba(63,214,193,0.15); border:1px solid var(--teal); color:var(--teal);}
  .alert-error{background:rgba(255,77,125,0.15); border:1px solid var(--rare); color:var(--rare);}

  .empty{color:var(--muted-2); text-align:center; padding:30px;}
</style>
</head>
<body>

<!-- 🔐 SIMPLE PASSWORD PROTECTION -->
<script>
(function() {
  // ⚠️ CHANGE THIS PASSWORD TO SOMETHING SECURE!
  const ADMIN_PASSWORD = "xenvault2026";
  const SESSION_KEY = 'xenvault_admin_auth';
  
  // If already authenticated this session, skip
  if (sessionStorage.getItem(SESSION_KEY) === 'true') {
    return;
  }
  
  const entered = prompt("🔐 Enter admin password:");
  if (entered === ADMIN_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, 'true');
  } else {
    alert("❌ Incorrect password. Redirecting to home.");
    window.location.href = "index.html";
  }
})();
</script>

<!-- Rest of admin page -->
<div class="admin-container">
  <a href="index.html" class="back-link">← Back to Marketplace</a>

  <div class="card">
    <h2><i>+</i> Add New Username</h2>
    <form id="addForm">
      <div class="form-row">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="aName" placeholder="e.g., x" required>
        </div>
        <div class="form-group">
          <label>Tier *</label>
          <select id="aTier">
            <option value="og">OG</option>
            <option value="rare">Rare</option>
            <option value="vintage">Vintage</option>
            <option value="plain">Clean</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Meta / Description</label>
          <input type="text" id="aMeta" placeholder="e.g., 4-char · dictionary word">
        </div>
        <div class="form-group">
          <label>Price ($) *</label>
          <input type="number" id="aPrice" placeholder="1999" step="1" required>
        </div>
      </div>
      <button type="submit" class="btn-admin">Add Username</button>
      <div id="addStatus"></div>
    </form>
  </div>

  <div class="card">
    <h2><i>📦</i> Inventory</h2>
    <div class="item-list" id="inventoryList"></div>
  </div>

  <div class="card">
    <h2><i>⚙️</i> Tools</h2>
    <button class="btn-admin btn-danger" onclick="resetInventory()">Reset to Default</button>
    <p style="color:var(--muted-2); font-size:12px; margin-top:8px;">⚠️ This will delete all custom products.</p>
  </div>
</div>

<script>
// ============================================================
// 🩸 XENVAULT ADMIN LOGIC
// ============================================================

function getInventory() {
  const stored = localStorage.getItem('xenvault_inventory');
  if (stored) {
    try { return JSON.parse(stored); } catch(e) {}
  }
  return [];
}

function saveInventory(data) {
  localStorage.setItem('xenvault_inventory', JSON.stringify(data));
}

function renderInventory() {
  const data = getInventory();
  const container = document.getElementById('inventoryList');
  if (data.length === 0) {
    container.innerHTML = '<div class="empty">No products in inventory.</div>';
    return;
  }
  container.innerHTML = data.map((d, i) => `
    <div class="item-row">
      <div class="info">
        <span class="name">@${d.name}</span>
        <span class="tier">${d.tier.toUpperCase()}</span>
        <span class="price">$${d.value.toLocaleString()}</span>
        <span class="status">${d.sold ? 'SOLD' : 'Available'}</span>
      </div>
      <button class="delete-btn" onclick="deleteProduct('${d.name}')">✕</button>
    </div>
  `).join('');
}

function deleteProduct(name) {
  if (!confirm(`Delete @${name}?`)) return;
  let data = getInventory();
  data = data.filter(d => d.name !== name);
  saveInventory(data);
  renderInventory();
}

function resetInventory() {
  if (!confirm('Reset to default inventory?')) return;
  const defaultData = [
    { name:"erase",   tier:"og",      meta:"4-char · dictionary word", value:18400, sold:false },
    { name:"admire",  tier:"og",      meta:"6-char · clean word", value:12900, sold:false },
    { name:"vex",     tier:"og",      meta:"3-char · rare cluster", value:9600, sold:false },
    { name:"quartz",  tier:"og",      meta:"6-char · word", value:8100, sold:false },
    { name:"drift",   tier:"rare",    meta:"5-char · word-match", value:3400, sold:false },
    { name:"cipher",  tier:"rare",    meta:"6-char · dev-adjacent", value:2650, sold:false },
    { name:"ember",   tier:"rare",    meta:"5-char · aesthetic", value:1950, sold:false },
    { name:"raven",   tier:"rare",    meta:"5-char · word", value:1700, sold:false },
    { name:"nullpnt", tier:"vintage", meta:"Dev-slang · legacy", value:1100, sold:false },
    { name:"ashcore", tier:"vintage", meta:"Legacy-style", value:980, sold:false },
    { name:"ferox",   tier:"vintage", meta:"Legacy-style", value:750, sold:false },
    { name:"lowkey",  tier:"plain",   meta:"Word-match", value:420, sold:false },
    { name:"glint",   tier:"plain",   meta:"Short word", value:390, sold:false },
    { name:"yonder",  tier:"plain",   meta:"Distinct word", value:310, sold:false },
  ];
  saveInventory(defaultData);
  renderInventory();
  const status = document.getElementById('addStatus');
  status.className = 'alert alert-success';
  status.textContent = '✅ Reset to default inventory.';
}

document.getElementById('addForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const name = document.getElementById('aName').value.trim();
  const tier = document.getElementById('aTier').value;
  const meta = document.getElementById('aMeta').value.trim() || tier.toUpperCase() + ' · rare handle';
  const value = parseInt(document.getElementById('aPrice').value);
  const status = document.getElementById('addStatus');

  if (!name || !value) {
    status.className = 'alert alert-error';
    status.textContent = '❌ Please fill in all required fields.';
    return;
  }

  const data = getInventory();
  if (data.find(d => d.name === name)) {
    status.className = 'alert alert-error';
    status.textContent = '❌ Username already exists.';
    return;
  }

  data.push({ name, tier, meta, value, sold: false });
  saveInventory(data);
  renderInventory();
  this.reset();
  status.className = 'alert alert-success';
  status.textContent = '✅ Added @' + name + ' for $' + value.toLocaleString();

  setTimeout(() => { status.className = ''; status.textContent = ''; }, 3000);
});

renderInventory();
</script>
</body>
</html>
